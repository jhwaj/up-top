<style>
  @font-face {
    font-family: "BMKkubulim";
    src: url("BMKkubulim.otf") format("opentype");
    font-display: swap;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --ink: #2b2b2b;
    --muted: #9a958c;
    --line: #ececec;
    --day: 54px;       /* 하루 한 칸 폭 */
    --head: 28px;      /* 날짜 헤더 높이 */
  }
  html, body { height: 100%; }
  body {
    font-family: "BMKkubulim", "Pretendard", -apple-system, sans-serif;
    background: #ffffff;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
    position: relative;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* 상단 입력 바 — 한 줄, 배경 위에 떠 있는 오버레이 */
  header {
    position: absolute; top: 0; left: 0; right: 0; z-index: 30;
    display: flex; align-items: center; gap: 9px;
    padding: 10px 16px;
  }
  h1 { font-size: 27px; font-weight: 800; letter-spacing: -0.01em; margin-right: 4px; transition: color .25s; }
  header.on-dark h1 { color: #fff; }
  header.on-dark .tool-btn { color: #fff; border-color: rgba(255,255,255,.5); background: transparent; }
  header.on-dark button.add { background: #fff; color: #2b2b2b; }
  header input[type="text"] { flex: 1 1 auto; min-width: 110px; }
  header input {
    font-family: inherit; font-size: 15px;
    padding: 8px 10px; border: 1px solid var(--line);
    border-radius: 8px; background: #fff; color: var(--ink);
  }
  header input:focus { outline: none; border-color: #c9c3b8; }
  .tools { margin-left: auto; display: flex; gap: 6px; }
  .tool-btn {
    font-family: inherit; font-size: 14px; font-weight: 500;
    padding: 8px 12px; border: 1px solid var(--line); border-radius: 8px;
    background: #fff; color: #2b2b2b; cursor: pointer;
  }
  .tool-btn:hover { border-color: #c9c3b8; }
  a.tool-btn { text-decoration: none; display: inline-flex; align-items: center; }
  button.add {
    font-family: inherit; font-size: 15px; font-weight: 700;
    padding: 8px 18px; border: none; border-radius: 8px;
    background: var(--ink); color: #fff; cursor: pointer; transition: opacity .15s;
  }
  button.add:hover { opacity: 0.85; }

  /* 수정 모달에서 쓰는 필드 */
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 13px; font-weight: 500; color: #2b2b2b; }
  .field input {
    font-family: inherit; font-size: 16px;
    padding: 9px 11px; border: 1px solid var(--line);
    border-radius: 9px; background: #fafafa; color: var(--ink);
  }
  .field input:focus { outline: none; border-color: #c9c3b8; background: #fff; }
  .field textarea {
    font-family: inherit; font-size: 15px; line-height: 1.45;
    padding: 9px 11px; border: 1px solid var(--line);
    border-radius: 9px; background: #fafafa; color: var(--ink);
    resize: vertical; min-height: 64px; width: 100%;
  }
  .field textarea:focus { outline: none; border-color: #c9c3b8; background: #fff; }

  /* 캘린더(타임라인) 영역 */
  .stage {
    flex: 1 1 auto;
    position: relative;
    overflow: auto;
    min-height: 0;
    background: #ffffff;
  }
  .timeline { position: relative; }
  .deco { position: absolute; pointer-events: none; z-index: 1; }
  .deco svg { display: block; overflow: visible; }
  .empty {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 14px; text-align: center;
  }

  .datebar {
    position: sticky; bottom: 0; z-index: 25; height: 20px;
  }
  .datehead {
    position: absolute; bottom: 0; height: 20px; width: var(--day);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; color: #2b2b2b; font-weight: 300; pointer-events: none;
  }
  .datehead.is-today { font-weight: 700; }
  .datehead.weekend { color: #FF403E; }
  .datebar.on-dark .datehead { color: #fff; }
  .datebar.on-dark .datehead.weekend { color: #FF403E; }

  .bar {
    position: absolute; height: 46px;
    border-radius: 0; color: #fff; cursor: pointer;
    display: flex; align-items: center; padding: 0 14px;
    font-weight: 700; font-size: 18px;
    white-space: nowrap; overflow: visible;
    transition: transform .12s ease;
    z-index: 3;
  }
  .bar:hover { transform: translateX(4px); z-index: 8; }
  .bar .label {
    flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap; pointer-events: none; text-align: right;
  }
  .bar.label-out { z-index: 12; }   /* 옆으로 빠진 라벨이 뒤 막대에 가려지지 않게 위로 */
  .bar.label-out .label {
    position: absolute; left: calc(100% + 8px); top: 50%; transform: translateY(-50%);
    flex: none; overflow: visible; color: #2b2b2b; font-weight: 700;
    text-shadow: 0 0 3px #fff, 0 0 3px #fff, 0 0 4px #fff;
  }
  .bar.label-out .label::before { content: "→ "; opacity: .5; }
  .bar .del {
    margin-left: 8px; width: 18px; height: 18px; flex: 0 0 auto;
    border-radius: 50%; background: rgba(0,0,0,.22); color: #fff;
    font-size: 12px; line-height: 18px; text-align: center; opacity: 0; transition: opacity .12s;
  }
  .bar:hover .del { opacity: 1; }
  .bar .ribbon { position: absolute; top: 0; right: 14px; pointer-events: none; }
  .bar.has-memo .label { padding-right: 30px; }
  .bar.has-memo.label-out .label { padding-right: 0; }

  .legend {
    flex: 0 0 auto; text-align: center; color: #2b2b2b; font-weight: 400;
    font-size: 14px; padding: 9px 0 14px; border-top: 1px solid var(--line);
  }

  /* 책 클릭 수정 모달 */
  .editor {
    position: fixed; inset: 0; z-index: 50;
    background: rgba(0,0,0,.25);
    display: flex; align-items: center; justify-content: center;
  }
  .editor[hidden] { display: none; }
  .editor-card {
    background: #fff; border-radius: 14px; padding: 20px;
    width: 280px; display: flex; flex-direction: column; gap: 12px;
    box-shadow: 0 12px 32px rgba(0,0,0,.22);
  }
  .editor-title { font-weight: 700; font-size: 18px; }
  .editor .field input { width: 100%; }
  .editor-btns { display: flex; gap: 8px; margin-top: 4px; }
  .editor-btns button {
    flex: 1; padding: 10px; border: none; border-radius: 9px;
    font-family: inherit; font-weight: 600; font-size: 15px; cursor: pointer;
  }
  .e-del { background: #f2f2f2; color: #2b2b2b; }
  .e-save { background: #2b2b2b; color: #fff; }

  /* 먼지 캐릭터 */
  .dust-wrap {
    position: absolute;
    transform: translateX(-50%);
    pointer-events: none;
    z-index: 20;
  }
  .bubble {
    position: absolute; left: 50%; bottom: 100%; transform: translateX(-50%);
    margin-bottom: 6px; background: #2b2b2b; color: #fff;
    font-size: 14px; font-weight: 700; padding: 4px 10px; border-radius: 11px; white-space: nowrap;
  }
  .bubble::after {
    content: ""; position: absolute; left: 50%; top: 100%; transform: translateX(-50%);
    border: 4px solid transparent; border-top-color: #2b2b2b;
  }
  .dust { animation: hop 2.4s ease-in-out infinite; transform-origin: bottom center; }
  .dust svg { width: 56px; height: auto; display: block; overflow: visible; }
  .dust .eye { transform-box: fill-box; transform-origin: center; animation: blink 4s infinite; }
  .dust .helmet { display: none; }
  .dust.space .helmet { display: inline; }

  /* 점프할 때 날리는 먼지 */
  .puffs { position: absolute; left: 50%; bottom: 2px; width: 0; height: 0; }
  .puff {
    position: absolute; border-radius: 48% 52% 50% 50%;
    background: #c4c4c4; opacity: 0;
    animation: puff 2.4s ease-out infinite;
  }
  .puff.a { width: 7px; height: 6px; --tx: -18px; --ty: -2px; }
  .puff.b { width: 6px; height: 7px; --tx: 18px; --ty: -4px; }
  .puff.c { width: 5px; height: 5px; --tx: -10px; --ty: -13px; }
  .puff.d { width: 5px; height: 6px; --tx: 12px; --ty: -12px; }
  .puff.e { width: 4px; height: 4px; --tx: 1px; --ty: -16px; }

  @keyframes hop {
    0%, 38%, 100% { transform: translateY(0) scaleY(1) scaleX(1); }
    44% { transform: translateY(0) scaleY(.84) scaleX(1.12); }
    60% { transform: translateY(-22px) scaleY(1.1) scaleX(.92); }
    72% { transform: translateY(-18px) scaleY(1.04) scaleX(.97); }
    84% { transform: translateY(0) scaleY(.88) scaleX(1.1); }
    92% { transform: translateY(0) scaleY(1.02) scaleX(.99); }
  }
  @keyframes blink {
    0%, 92%, 100% { transform: scaleY(1); }
    96% { transform: scaleY(.1); }
  }
  @keyframes puff {
    0%, 80% { opacity: 0; transform: translate(0,0) scale(.3); }
    86% { opacity: .55; }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(1.15); }
  }
  @media (prefers-reduced-motion: reduce) { .dust, .eye, .puff { animation: none; } }

  /* 업데이트 알림 배너 */
  .update-bar {
    position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%); z-index: 60;
    display: none; align-items: center; gap: 12px;
    background: #2b2b2b; color: #fff; padding: 10px 12px 10px 18px; border-radius: 999px;
    box-shadow: 0 8px 24px rgba(0,0,0,.28); font-size: 14px; font-weight: 600;
  }
  .update-bar button {
    font-family: inherit; font-weight: 700; font-size: 14px; cursor: pointer;
    border: none; border-radius: 999px; padding: 7px 16px; background: #fff; color: #2b2b2b;
  }
  .update-bar button:hover { opacity: .85; }
</style>
</head>
<body>
  <header>
    <h1>UP TOP</h1>
    <input type="text" id="title" placeholder="업무 이름" autocomplete="off">
    <input type="date" id="start">
    <input type="date" id="end">
    <button class="add" onclick="addTask()">올리기</button>
    <div class="tools">
      <button class="tool-btn" id="installBtn" style="display:none" onclick="pwaInstall()">설치</button>
      <a class="tool-btn" href="standalone.html" download="업무 캘린더.html">HTML</a>
      <button class="tool-btn" onclick="exportData()">백업</button>
      <label class="tool-btn">가져오기<input type="file" accept="application/json" onchange="importData(event)" hidden></label>

  <div class="stage" id="stage">

              <feTurbulence type="turbulence" baseFrequency="0.045" numOctaves="2" seed="7" result="n"/>

             stroke-linecap="round" stroke-linejoin="round">

            <path d="M12 31 C8 27 10 21 16 21 C14 15 21 14 23 19 C25 13 31 13 32 19
                     C35 14 41 15 39 21 C46 20 49 26 44 29 C48 32 44 36 40 34
                     C39 38 33 37 32 34 C30 37 25 37 24 34 C19 37 13 36 12 31 Z"
                  fill="#d4d4d4"/>
            <ellipse cx="18" cy="30" rx="2.4" ry="1.5" fill="#ffadc0" stroke="none"/>
            <ellipse cx="41" cy="30" rx="2.4" ry="1.5" fill="#ffadc0" stroke="none"/>
            <ellipse class="eye" cx="24" cy="26" rx="1.8" ry="2.4" fill="#2b2b2b" stroke="none"/>
            <ellipse class="eye" cx="35" cy="26" rx="1.8" ry="2.4" fill="#2b2b2b" stroke="none"/>
            <path d="M27 30 Q29.5 33 32 30"/>
            <path class="helmet" d="M29 1 L29 -7" stroke="#2b2b2b" stroke-width="2"/>
            <circle class="helmet" cx="29" cy="-9" r="2.6" fill="#FF403E" stroke="#2b2b2b" stroke-width="1.4"/>
            <ellipse class="helmet" cx="29" cy="21" rx="22" ry="20" fill="rgba(216,238,255,.26)" stroke="#2b2b2b" stroke-width="2"/>
          </g>

        <span class="puff a"></span><span class="puff b"></span><span class="puff c"></span><span class="puff d"></span><span class="puff e"></span>

  <div class="legend" id="legend"></div>

    <span>✨ 새 버전이 나왔어요</span>

  <div class="editor" id="editor" hidden onclick="closeEditor()">
    <div class="editor-card" onclick="event.stopPropagation()">
      <div class="field"><label>업무 이름</label><input type="text" id="e-title" autocomplete="off"></div>
      <div class="field"><label>시작일</label><input type="date" id="e-start"></div>

        <button class="e-del" onclick="deleteEditing()">삭제</button>
        <button class="e-save" onclick="saveEditing()">저장</button>

<script>
const KEY = "work_book_tower_v1";
const DAY = 54, BAR_H = 46, ROW_GAP = 0, TOP_PAD = 200, BASE = 24;
const PALETTE = [
  "#0CEFD3","#1A7CFF","#6580FF","#FF403E","#FF8400","#FFC600","#F13FA1","#A8744F",
  "#08A794","#0BD7BE","#87FFE5","#B0FFEB","#E6FFF8","#73B6FF","#FFEE6E","#FFAA55"
];
const BUBBLES = [
  "오늘", "오늘 ☀️", "오늘 날씨 맑음 ☀️", "오늘 날씨 비옴 ☔",
  "오늘 날씨 흐림 ☁️", "오늘도 화이팅!", "오늘 뭐하지?", "오늘 바람 솔솔 🍃",
  "나는 책먼지!"
];
function randomBubble() { return BUBBLES[Math.floor(Math.random() * BUBBLES.length)]; }

// 책탑 높이에 따라 지상→하늘→우주 (bottom 기준 px)
const SCALE = 1.9;   // 환경 전환 높이 배율 (클수록 더 많이 쌓아야 하늘→우주)
const SKY_GRADIENT = "linear-gradient(to top," +
  [["#ffffff",0],["#f4faff",130],["#e2f1ff",330],["#bbdcff",640],
   ["#8badde",980],["#5566a8",1350],["#2c2a5c",1750],["#120e30",2150],["#07051c",2600]]
    .map(s => s[0] + " " + Math.round(s[1] * SCALE) + "px").join(",") + ")";

const GRASS = '<svg width="26" viewBox="0 0 26 22" xmlns="http://www.w3.org/2000/svg">' +
  '<g filter="url(#sketch)" fill="none" stroke="#3a9d4a" stroke-width="2" stroke-linecap="round">' +
  '<path d="M13 22 Q10 12 7 5"/><path d="M13 22 Q13 11 13 4"/><path d="M13 22 Q16 12 19 6"/></g></svg>';
const CLOUD = '<svg width="64" viewBox="0 0 72 40" xmlns="http://www.w3.org/2000/svg">' +
  '<g filter="url(#sketch)" fill="#ffffff" stroke="#aab3bd" stroke-width="2" stroke-linejoin="round">' +
  '<path d="M18 32 Q7 32 9 23 Q4 14 15 15 Q17 6 28 9 Q34 2 43 9 Q55 6 55 17 Q66 17 61 27 Q63 33 52 32 Z"/></g></svg>';
const STAR = '<svg width="22" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">' +
  '<g filter="url(#sketch)" fill="#FFC600" stroke="#c79e00" stroke-width="1.4" stroke-linejoin="round">' +
  '<path d="M12 2 L14.7 8.6 L21.8 9 L16.2 13.6 L18.2 20.6 L12 16.6 L5.8 20.6 L7.8 13.6 L2.2 9 L9.3 8.6 Z"/></g></svg>';
const PLANET = '<svg width="84" viewBox="0 0 92 60" xmlns="http://www.w3.org/2000/svg">' +
  '<g filter="url(#sketch)" stroke="#2b2b2b" stroke-width="2" stroke-linejoin="round">' +
  '<circle cx="46" cy="30" r="20" fill="#FF8400"/>' +
  '<ellipse cx="46" cy="30" rx="40" ry="11" fill="none"/></g></svg>';
const PLANET2 = '<svg width="58" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">' +
  '<g filter="url(#sketch)" stroke="#2b2b2b" stroke-width="2" stroke-linejoin="round">' +
  '<circle cx="30" cy="30" r="22" fill="#6580FF"/>' +
  '<circle cx="22" cy="24" r="4" fill="none"/><circle cx="37" cy="36" r="6" fill="none"/></g></svg>';
const RIBBON = '<svg class="ribbon" width="15" viewBox="0 0 16 28" xmlns="http://www.w3.org/2000/svg">' +
  '<path filter="url(#sketch)" d="M2 1 H14 V25 L8 18.5 L2 25 Z" fill="#FF7A7A" stroke="#2b2b2b" stroke-width="1.8" stroke-linejoin="round"/></svg>';
const NEBULA = '<svg width="160" viewBox="0 0 160 92" xmlns="http://www.w3.org/2000/svg">' +
  '<g filter="url(#sketch)" stroke="#c084fc" stroke-width="1.6" stroke-linejoin="round">' +
  '<path d="M32 64 Q12 60 20 44 Q12 28 32 30 Q40 12 60 22 Q80 8 100 24 Q128 18 128 40 Q150 46 134 64 Q140 82 108 74 Q84 86 58 74 Q42 80 32 64 Z" fill="rgba(150,90,230,.30)"/>' +
  '<path d="M54 52 Q76 42 100 50" fill="none" stroke="#f0a6e0" stroke-width="2"/>' +
  '<circle cx="60" cy="46" r="1.6" fill="#fff" stroke="none"/><circle cx="92" cy="56" r="1.6" fill="#fff" stroke="none"/><circle cx="78" cy="38" r="1.4" fill="#fff" stroke="none"/></g></svg>';

function addDeco(tl, html, x, bottom, z) {
  const d = document.createElement("div");
  d.className = "deco";
  d.style.left = x + "px";
  d.style.bottom = bottom + "px";
  if (z) d.style.zIndex = z;
  d.innerHTML = html;
  tl.appendChild(d);
}
function decorate(tl, width, height, totalDays) {
  // 풀: 날짜 칸마다 하나씩, 날짜 글자 바로 위에 (책 앞 레이어)
  for (let i = 0; i < totalDays; i++) {
    addDeco(tl, GRASS, i * DAY + DAY / 2 - 13, 19, 4);
  }
  // 구름 (하늘 구간)
  [[0.18,400],[0.7,470],[0.4,660],[0.85,760],[0.12,900],[0.6,1020]]
    .forEach(([fx, y0]) => { const y = y0 * SCALE; if (y + 60 < height) addDeco(tl, CLOUD, fx * (width - 80), y, 1); });
  // 별 (우주 구간)
  [[0.1,820],[0.35,900],[0.6,860],[0.82,980],[0.2,1120],[0.5,1180],[0.75,1260],[0.3,1420],[0.65,1500],
   [0.45,1680],[0.15,1850],[0.55,1980],[0.85,2150],[0.3,2300],[0.7,2480]]
    .forEach(([fx, y0]) => { const y = y0 * SCALE; if (y + 24 < height) addDeco(tl, STAR, fx * (width - 40), y, 1); });
  // 행성 (우주 깊은 곳)
  if (1550*SCALE + 60 < height) addDeco(tl, PLANET, 0.16 * (width - 90), 1550 * SCALE, 1);
  if (2150*SCALE + 60 < height) addDeco(tl, PLANET2, 0.68 * (width - 60), 2150 * SCALE, 1);
  // 은하/성운 (더 깊은 우주)
  if (1900*SCALE + 92 < height) addDeco(tl, NEBULA, 0.32 * (width - 160), 1900 * SCALE, 1);
  if (2450*SCALE + 92 < height) addDeco(tl, NEBULA, 0.6 * (width - 160), 2450 * SCALE, 1);
}

function pickColor(used) {
  const avail = PALETTE.filter(c => !used.includes(c));
  const pool = avail.length ? avail : PALETTE;
  return pool[Math.floor(Math.random() * pool.length)];
}
function ensureColors(tasks) {
  const used = tasks.map(t => t.color).filter(Boolean);
  let changed = false;
  tasks.forEach(t => { if (!t.color) { t.color = pickColor(used); used.push(t.color); changed = true; } });
  if (changed) save(tasks);
  return tasks;
}
function textColor(hex) {
  const n = parseInt(hex.slice(1), 16);
  const L = 0.299 * (n >> 16) + 0.587 * ((n >> 8) & 255) + 0.114 * (n & 255);
  return L > 170 ? "#2b2b2b" : "#ffffff";
}

function load() { try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch { return []; } }
function save(t) { localStorage.setItem(KEY, JSON.stringify(t)); }
function todayStr() { const d = new Date(); return iso(d); }
function iso(d) { return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0"); }
function parseD(s) { return new Date(s + "T00:00:00"); }
function diffDays(a, b) { return Math.round((parseD(b) - parseD(a)) / 86400000); }
function addDays(s, n) { const d = parseD(s); d.setDate(d.getDate() + n); return iso(d); }
function span(t) { return diffDays(t.start, t.end) + 1; }            // 포함 일수
function fmt(s) { const d = parseD(s); return (d.getMonth()+1) + "." + d.getDate(); }

function addTask() {
  const title = document.getElementById("title").value.trim();
  const start = document.getElementById("start").value;
  const end = document.getElementById("end").value;
  if (!title) { alert("업무 이름을 입력하세요."); return; }
  if (!start || !end) { alert("시작일과 종료일을 입력하세요."); return; }
  if (parseD(end) < parseD(start)) { alert("종료일이 시작일보다 빠릅니다."); return; }
  snapshot();
  const tasks = load();
  const used = tasks.map(t => t.color).filter(Boolean);
  tasks.push({ id: Date.now(), title, start, end, color: pickColor(used) });
  save(tasks);
  document.getElementById("title").value = "";
  const t0 = todayStr();
  document.getElementById("start").value = t0;
  document.getElementById("end").value = t0;
  render(true);
}
function removeTask(id) { snapshot(); save(load().filter(t => t.id !== id)); render(true); }
function resetAll() { if (confirm("모든 업무를 삭제할까요? 되돌릴 수 없습니다.")) { snapshot(); save([]); render(); } }

// 실행취소 (Ctrl+Z / Cmd+Z): 변경 직전 상태를 쌓아두고 복원
let undoStack = [];
function snapshot() { undoStack.push(localStorage.getItem(KEY) || "[]"); if (undoStack.length > 100) undoStack.shift(); }
function undo() {
  if (!undoStack.length) return;
  localStorage.setItem(KEY, undoStack.pop());
  if (!document.getElementById("editor").hidden) closeEditor();
  render(true);
}

let editingId = null;
function openEditor(t) {
  editingId = t.id;
  document.getElementById("e-title").value = t.title;
  document.getElementById("e-start").value = t.start;
  document.getElementById("e-end").value = t.end;
  document.getElementById("e-memo").value = t.memo || "";
  document.getElementById("editor").hidden = false;
}
function closeEditor() { document.getElementById("editor").hidden = true; editingId = null; }
function saveEditing() {
  const title = document.getElementById("e-title").value.trim();
  const s = document.getElementById("e-start").value;
  const e = document.getElementById("e-end").value;
  if (!title) { alert("업무 이름을 입력하세요."); return; }
  if (!s || !e) { alert("날짜를 입력하세요."); return; }
  if (parseD(e) < parseD(s)) { alert("종료일이 시작일보다 빠릅니다."); return; }
  const tasks = load();
  const memo = document.getElementById("e-memo").value.trim();
  const t = tasks.find(x => x.id === editingId);
  if (t) { snapshot(); t.title = title; t.start = s; t.end = e; t.memo = memo; save(tasks); }
  closeEditor();
  render(true);
}
function deleteEditing() { const id = editingId; closeEditor(); if (id != null) removeTask(id); }

function render(keepScroll) {
  const stage = document.getElementById("stage");
  const tl = document.getElementById("timeline");
  const legend = document.getElementById("legend");
  const dust = document.getElementById("dust");
  const today = todayStr();
  const tasks = ensureColors(load());
  const prevScroll = stage.scrollLeft;
  stage.appendChild(dust);   // 이전 렌더에서 타임라인에 넣어둔 먼지 회수 (아래 innerHTML 비우기에서 보호)
  tl.innerHTML = "";

  dust.style.display = "block";

  // 날짜 범위: 모든 업무 + 오늘 포함, 앞뒤 2일 여유
  let lo = today, hi = today;
  tasks.forEach(t => { if (t.start < lo) lo = t.start; if (t.end > hi) hi = t.end; });
  lo = addDays(lo, -2);
  hi = addDays(hi, 2);
  let totalDays = diffDays(lo, hi) + 1;
  const needDays = Math.ceil(stage.clientWidth / DAY) + 1;   // 화면 너비만큼 날짜·풀 채우기
  if (totalDays < needDays) { hi = addDays(hi, needDays - totalDays); totalDays = needDays; }

  // 등록한 순서대로 쌓임 (먼저 등록한 책이 바닥, 최근 등록이 위)
  const sorted = [...tasks].sort((a, b) => a.id - b.id);

  const width = Math.max(totalDays * DAY, stage.clientWidth);
  tl.style.width = width + "px";
  tl.style.background = SKY_GRADIENT;

  // 날짜 숫자 — 화면 하단 고정 바(datebar)에, 가로로만 책과 함께 이동
  const datebar = document.getElementById("datebar");
  datebar.innerHTML = "";
  datebar.style.width = width + "px";
  for (let i = 0; i < totalDays; i++) {
    const ds = addDays(lo, i);
    const d = parseD(ds);
    const dow = d.getDay();
    const head = document.createElement("div");
    head.className = "datehead" + (ds === today ? " is-today" : "") + (dow === 0 || dow === 6 ? " weekend" : "");
    head.style.left = (i * DAY) + "px";
    head.textContent = d.getDate();
    datebar.appendChild(head);
  }

  const tx = diffDays(lo, today) * DAY + DAY / 2;

  // 책 막대: 테트리스 패킹 — 기간(가로 구간)이 겹치는 책 위에 얹고, 없으면 바닥까지 내려감
  let todayTop = BASE, hasToday = false, maxTop = BASE;
  const placed = [];
  sorted.forEach((t) => {
    const left = diffDays(lo, t.start) * DAY;
    const w = span(t) * DAY;
    const right = left + w;
    let bottom = BASE;
    placed.forEach(p => { if (left < p.right && p.left < right) bottom = Math.max(bottom, p.top); });
    const topY = bottom + BAR_H;
    placed.push({ left, right, top: topY });
    maxTop = Math.max(maxTop, topY);
    const color = t.color || PALETTE[0];
    const onToday = t.start <= today && today <= t.end;
    if (onToday) { hasToday = true; todayTop = Math.max(todayTop, topY); }

    const hasMemo = !!(t.memo && t.memo.trim());
    const bar = document.createElement("div");
    bar.className = "bar" + (onToday ? " is-today" : "") + (hasMemo ? " has-memo" : "");
    bar.style.left = left + "px";
    bar.style.width = (w - 2) + "px";
    bar.style.bottom = bottom + "px";
    bar.style.background = color;
    bar.style.color = textColor(color);
    bar.innerHTML = '<span class="label">' + esc(t.title) + '</span>' + (hasMemo ? RIBBON : "");
    bar.title = hasMemo ? t.memo : "";
    bar.onclick = () => openEditor(t);
    tl.appendChild(bar);
    // 막대 안에 이름이 안 들어가면(잘리면) 옆 화살표 라벨로
    const lbl = bar.firstChild;
    if (lbl.scrollWidth > lbl.clientWidth + 1) bar.classList.add("label-out");
  });

  // 책 높이에 맞춰 타임라인 높이·데코 결정
  const height = Math.max(maxTop + TOP_PAD, stage.clientHeight);
  tl.style.height = height + "px";
  decorate(tl, width, height, totalDays);

  // 먼지: 오늘 위치(x)의 책탑 꼭대기에 딱 붙어서 (타임라인 안에 두어 책과 같은 좌표·스크롤)
  tl.appendChild(dust);
  dust.style.left = tx + "px";
  dust.style.bottom = (todayTop - 3) + "px";
  dust.querySelector(".dust").classList.toggle("space", todayTop >= 1350 * SCALE);
  const bub = document.getElementById("bubble");
  bub.style.display = (hasToday || tasks.length === 0) ? "block" : "none";
  if (hasToday) bub.textContent = randomBubble();
  else if (tasks.length === 0) bub.textContent = "나는 책먼지!";

  legend.textContent = tasks.length === 0
    ? "업무를 올려 책탑을 쌓아보세요"
    : "총 " + tasks.length + "건 · " + fmt(lo) + " ~ " + fmt(hi);

  // 가로: 오늘 날짜 중심 / 세로: 오늘 책탑 꼭대기가 화면 상단에 오도록 (아래로 스크롤하면 바닥 확인 가능)
  stage.scrollLeft = Math.max(0, tx - stage.clientWidth / 2);
  const headerH = document.querySelector("header").offsetHeight;
  stage.scrollTop = Math.max(0, (height - todayTop) - headerH - 130);
  updateHeaderColor();
}

function exportData() {
  const data = localStorage.getItem(KEY) || "[]";
  const blob = new Blob([data], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "업무캘린더_백업.json"; a.click();
  URL.revokeObjectURL(url);
}
function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const arr = JSON.parse(reader.result);
      if (!Array.isArray(arr)) throw 0;
      snapshot(); save(arr); render();
      alert("불러왔습니다: " + arr.length + "건");
    } catch { alert("올바른 백업 파일이 아닙니다."); }
  };
  reader.readAsText(file);
  e.target.value = "";
}
function esc(s) { return s.replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c])); }

// 헤더 뒤 배경(화면 최상단)이 어두우면 글자 흰색으로
function updateHeaderColor() {
  const tl = document.getElementById("timeline");
  const stage = document.getElementById("stage");
  const yTop = tl.offsetHeight - stage.scrollTop;                              // 화면 최상단 배경 높이
  document.querySelector("header").classList.toggle("on-dark", yTop >= 1000);
  const yBottom = tl.offsetHeight - (stage.scrollTop + stage.clientHeight);    // 화면 최하단 배경 높이
  document.getElementById("datebar").classList.toggle("on-dark", yBottom >= 1000);
}

const today = todayStr();
document.getElementById("start").value = today;
document.getElementById("end").value = today;
document.getElementById("title").addEventListener("keydown", e => { if (e.key === "Enter") addTask(); });
document.addEventListener("keydown", e => {
  if ((e.metaKey || e.ctrlKey) && !e.shiftKey && (e.key === "z" || e.key === "Z")) {
    const tag = (document.activeElement && document.activeElement.tagName) || "";
    if (tag === "INPUT" || tag === "TEXTAREA") return;   // 입력 중일 땐 기본 실행취소 유지
    e.preventDefault();
    undo();
  }
});
document.getElementById("stage").addEventListener("scroll", updateHeaderColor);
let _resizeT;
window.addEventListener("resize", () => { clearTimeout(_resizeT); _resizeT = setTimeout(render, 150); });
setInterval(() => {
  const b = document.getElementById("bubble");
  if (b && b.style.display !== "none") b.textContent = randomBubble();
}, 3500);

render();
if (document.fonts && document.fonts.ready) document.fonts.ready.then(render);

// PWA: 오프라인·설치 지원 + 새 버전 감지 → '업데이트' 버튼 (파일로 직접 열 땐 생략)
let _swUpdating = false;
function showUpdate(reg) {
  const bar = document.getElementById("updateBar");
  if (!bar) return;
  bar.style.display = "flex";
  document.getElementById("updateBtn").onclick = () => {
    _swUpdating = true;
    if (reg.waiting) reg.waiting.postMessage({ type: "SKIP_WAITING" });
    bar.style.display = "none";
  };
}
if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
  window.addEventListener("load", async () => {
    try {
      const reg = await navigator.serviceWorker.register("sw.js");
      // 이미 대기 중인 새 워커가 있으면(다른 탭에서 설치됨) 즉시 알림
      if (reg.waiting && navigator.serviceWorker.controller) showUpdate(reg);
      // 새 워커가 설치되는 중이면 설치 완료 시 알림
      reg.addEventListener("updatefound", () => {
        const nw = reg.installing;
        if (!nw) return;
        nw.addEventListener("statechange", () => {
          if (nw.state === "installed" && navigator.serviceWorker.controller) showUpdate(reg);
        });
      });
      // 앱이 열려있는 동안 주기적으로 새 버전 확인 (1시간마다)
      setInterval(() => reg.update().catch(() => {}), 3600000);
    } catch (e) {}
  });
  // 사용자가 '업데이트'를 눌러 워커가 교체되면 새로고침 (최초 설치 땐 반응 안 함)
  navigator.serviceWorker.addEventListener("controllerchange", () => {
    if (_swUpdating) location.reload();
  });
}

// PWA 설치 버튼 (Chrome/Edge · 맥/윈도우 공통)
let _deferredPrompt = null;
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  _deferredPrompt = e;
  const b = document.getElementById("installBtn");
  if (b) b.style.display = "";
});
window.addEventListener("appinstalled", () => {
  _deferredPrompt = null;
  const b = document.getElementById("installBtn");
  if (b) b.style.display = "none";
});
function pwaInstall() {
  if (!_deferredPrompt) {
    alert("주소창의 설치 아이콘(⊕)을 눌러 설치하세요.\nSafari는 공유 → \"Dock에 추가\".");
    return;
  }
  _deferredPrompt.prompt();
  _deferredPrompt.userChoice.finally(() => { _deferredPrompt = null; });
}
</script>
